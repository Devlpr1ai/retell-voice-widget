<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Agent Widget Demo</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }
    .demo-container {
      text-align: center;
    }
    h1 { color: #333; margin-bottom: 8px; }
    p { color: #666; }
  </style>
</head>
<body>
  <div class="demo-container">
    <h1>Voice Agent Widget Demo</h1>
    <p>Click the microphone button in the bottom-right corner to start a call.</p>
  </div>

  <!-- Widget loads all SDK deps dynamically — single script is all you need -->
  <script src="retell-widget.js"></script>
  <script>
    // Queue init config — the widget will apply it once the SDK finishes loading
    window._retellWidgetPendingOpts = {
      agentId: "agent_9b19fe31c775d0e630be679b4d",
      useNetlify: true,
    };
  </script>
</body>
</html>
